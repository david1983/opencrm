# Development docker-compose with hot-reload support
# Usage: docker-compose -f docker-compose.dev.yml up

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/opencrm
      - JWT_SECRET=dev-secret-change-in-production
      - JWT_EXPIRE=7d
      - CLIENT_URL=http://localhost:5173
    volumes:
      - ./server:/app/server
      - ./client:/app/client
      - /app/node_modules
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - opencrm-network

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - opencrm-network

volumes:
  mongodb_data:

networks:
  opencrm-network:
    driver: bridge